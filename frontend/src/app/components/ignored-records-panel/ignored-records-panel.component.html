<div class="panel-container">
  <div class="panel-header">
    <h3>Registros Ignorados ({{ ignoredRecords().length }})</h3>
    <button mat-icon-button (click)="close.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  @if (ignoredRecords().length > 0) {
    <table mat-table [dataSource]="paginatedRecords()" class="ignored-table">
      <ng-container matColumnDef="page">
        <th mat-header-cell *matHeaderCellDef>Página</th>
        <td mat-cell *matCellDef="let row">{{ row.page }}</td>
      </ng-container>

      <ng-container matColumnDef="sourceFile">
        <th mat-header-cell *matHeaderCellDef>Arquivo</th>
        <td mat-cell *matCellDef="let row">{{ row.sourceFile }}</td>
      </ng-container>

      <ng-container matColumnDef="reason">
        <th mat-header-cell *matHeaderCellDef>Motivo</th>
        <td mat-cell *matCellDef="let row">{{ row.reason }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [length]="ignoredRecords().length"
      [pageSize]="pageSize()"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    />
  } @else {
    <div class="empty-state">
      <p>Nenhum registro ignorado.</p>
    </div>
  }
</div>
