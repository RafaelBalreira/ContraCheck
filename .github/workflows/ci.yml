name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backend Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install system fonts for PDF generation
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Run backend tests with pytest and coverage
        run: |
          cd backend
          python -m pytest tests/ -v --cov --cov-report=xml

      - name: Generate backend coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          rm -rf .github/badges/*
          cd backend
          python - <<'PYEOF'
          import xml.etree.ElementTree as ET
          import os

          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          pct = round(float(root.get("line-rate")) * 100)

          if pct >= 90:
              color = "#4c1"
          elif pct >= 75:
              color = "#97ca00"
          elif pct >= 50:
              color = "#dfb317"
          else:
              color = "#e05d44"

          label = "cobertura"
          l1 = len(label) * 7 + 10
          l2 = len(f"{pct}%") * 7 + 10
          w = l1 + l2

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{w}" height="20">
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <rect rx="3" width="{w}" height="20" fill="#555"/>
            <rect rx="3" x="{l1}" width="{l2}" height="20" fill="{color}"/>
            <path d="M{l1} 0h4v20h-4z" fill="{color}"/>
            <g text-anchor="middle" font-family="DejaVu Sans,Geneva,Verdana,sans-serif" font-size="11">
              <text x="{l1/2}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
              <text x="{l1/2}" y="14" fill="#fff">{label}</text>
              <text x="{l1 + l2/2}" y="15" fill="#010101" fill-opacity=".3">{pct}%</text>
              <text x="{l1 + l2/2}" y="14" fill="#fff">{pct}%</text>
            </g>
          </svg>'''

          os.makedirs("../.github/badges", exist_ok=True)
          with open("../.github/badges/backend-coverage.svg", "w") as f:
              f.write(svg)
          print(f"Badge generated: {pct}%")
          PYEOF

      - name: Commit badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/backend-coverage.svg
          git diff --staged --quiet || git commit -m "ci: update coverage badge [skip ci]"
          git push

  snyk-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    environment: development
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backend Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Scan backend dependencies for vulnerabilities with Snyk
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=backend/requirements.txt --severity-threshold=high --sarif-file-output=snyk-backend.sarif

      - name: Upload Snyk backend results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-backend.sarif
          category: snyk-backend

  snyk-frontend:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install frontend npm dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Scan frontend dependencies for vulnerabilities with Snyk
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=frontend/package.json --severity-threshold=high --sarif-file-output=snyk-frontend.sarif

      - name: Upload Snyk frontend results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-frontend.sarif
          category: snyk-frontend

  snyk-monitor:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [snyk-backend, snyk-frontend]
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backend Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install frontend npm dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Register backend dependencies in Snyk monitor
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --file=backend/requirements.txt --project-name=ContraCheck/backend

      - name: Register frontend dependencies in Snyk monitor
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --file=frontend/package.json --project-name=ContraCheck/frontend
