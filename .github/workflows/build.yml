name: Build Executable

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v') {
            $tag = $tag -replace '^v', ''
          }
          echo "APP_VERSION=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build Angular frontend
        shell: pwsh
        run: |
          cd frontend
          npm ci
          $ver = "${{ steps.version.outputs.APP_VERSION }}"
          (Get-Content src/environments/version.ts) -replace "APP_VERSION = 'dev'", "APP_VERSION = '$ver'" | Set-Content src/environments/version.ts
          npx ng build --configuration production

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        shell: pwsh
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ steps.version.outputs.APP_VERSION }}"
          pyinstaller `
            --name ContraCheck `
            --onefile `
            --add-data "frontend/dist/frontend/browser;frontend/dist/frontend/browser" `
            --hidden-import backend `
            --hidden-import backend.main `
            --hidden-import backend.application `
            --hidden-import backend.application.extraction_strategy `
            --hidden-import backend.application.pdf_service `
            --hidden-import backend.application.report_service `
            --hidden-import backend.domain `
            --hidden-import backend.domain.models `
            --hidden-import backend.domain.exceptions `
            --hidden-import backend.infrastructure `
            --hidden-import backend.infrastructure.pdf_extractor `
            --collect-submodules backend `
            --noconfirm `
            -c `
            backend/main.py

      - name: Upload executable
        uses: actions/upload-artifact@v5
        with:
          name: ContraCheck-${{ steps.version.outputs.APP_VERSION }}-windows
          path: dist/ContraCheck.exe
          if-no-files-found: error
